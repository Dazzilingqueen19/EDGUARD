<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GameGuardian Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <style>
    body {
      padding: 1.5rem;
      background-color: #f8f9fa;
      min-width: 500px;
    }
    .card {
      border-radius: 0.75rem;
    }
    .form-label {
      font-weight: 500;
    }
    h2 {
        color: #0d6efd;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="card p-4 shadow-sm">
      <h2 class="mb-4 border-bottom pb-3">GameGuardian Settings</h2>

      <div class="row g-3">
        <div class="col-md-6">
          <label for="backend" class="form-label">Backend URL</label>
          <input id="backend" type="text" class="form-control" placeholder="http://127.0.0.1:5000">
        </div>
        <div class="col-md-6">
          <label for="apikey" class="form-label">API Key (X-API-KEY)</label>
          <input id="apikey" type="text" class="form-control" placeholder="devkey">
        </div>

        <div class="col-md-6">
          <label for="safe" class="form-label">Safe Redirect Site</label>
          <select id="safe" class="form-select">
            <optgroup label="General Safe Games">
              <option value="https://games.google.com">Google Games</option>
            </optgroup>
            <optgroup label="Brain & Puzzle Games">
              <option value="https://www.mindgames.com/">MindGames</option>
              <option value="https://www.brainbashers.com/">BrainBashers</option>
              <option value="https://www.gamesforthebrain.com/">Games for the Brain</option>
              <option value="https://www.crazygames.com/c/puzzle">CrazyGames (Puzzles)</option>
              <option value="https://www.arkadium.com/free-online-games/brain-games/">Arkadium (Brain Games)</option>
            </optgroup>
          </select>
        </div>
        <div class="col-md-6">
          <label for="action" class="form-label">Action on Detection</label>
          <select id="action" class="form-select">
            <option value="redirect">Redirect Current Tab</option>
            <option value="open_tab">Open Safe Site in New Tab</option>
            <option value="close">Close Current Tab</option>
          </select>
        </div>

        <div class="col-12">
          <label for="keywords" class="form-label">Keywords (one per line)</label>
          <textarea id="keywords" class="form-control" rows="5"></textarea>
        </div>

        <div class="col-12">
            <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" role="switch" id="sendlogs">
                <label class="form-check-label" for="sendlogs">Send activity logs to backend</label>
            </div>
        </div>

      </div>

      <div class="d-flex align-items-center mt-4">
        <button id="save" class="btn btn-primary px-4">Save Settings</button>
        <div id="msg" class="ms-3 text-success fw-bold"></div>
      </div>
    </div>
  </div>

<script>
function load(){ chrome.storage.sync.get(null, cfg=>{
  document.getElementById('backend').value = cfg.backend_url || 'http://127.0.0.1:5000';
  document.getElementById('apikey').value = cfg.api_key || 'devkey';
  document.getElementById('safe').value = cfg.safe_site || 'https://games.google.com';
  document.getElementById('action').value = cfg.action || 'redirect';
  document.getElementById('sendlogs').checked = (typeof cfg.send_logs === 'undefined') ? true : cfg.send_logs;
  document.getElementById('keywords').value = (cfg.keywords || []).join('\n');
}); }
document.getElementById('save').addEventListener('click', ()=>{
  const backend = document.getElementById('backend').value || 'http://127.0.0.1:5000';
  const api_key = document.getElementById('apikey').value || 'devkey';
  const safe_site = document.getElementById('safe').value || 'https://games.google.com';
  const action = document.getElementById('action').value;
  const send_logs = document.getElementById('sendlogs').checked;
  const keywords = document.getElementById('keywords').value.split('\n').map(s=>s.trim()).filter(Boolean);
  chrome.storage.sync.set({ backend_url: backend, api_key: api_key, safe_site: safe_site, action: action, send_logs: send_logs, keywords: keywords }, ()=>{
    const msgEl = document.getElementById('msg');
    msgEl.textContent = 'Saved!';
    setTimeout(()=> msgEl.textContent = '', 2000);
  });
});
load();
</script>
</body></html>
