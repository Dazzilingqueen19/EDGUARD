<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GameGuardian</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <style>
    body {
      width: 280px;
      background-color: #f8f9fa;
    }
    .card-header {
      background-color: #0d6efd;
      color: white;
    }
    .status-badge {
      font-size: 0.9rem;
    }
  </style>
</head>
<body class="p-2">
  <div class="card text-center shadow-sm">
    <div class="card-header">
      <h5 class="mb-0">GameGuardian</h5>
    </div>
    <div class="card-body">
      <p class="card-text mb-2">Monitoring Status:</p>
      <p>
        <span id="status-enabled" class="badge rounded-pill bg-success-subtle text-success-emphasis p-2 d-none">Enabled</span>
        <span id="status-disabled" class="badge rounded-pill bg-secondary-subtle text-secondary-emphasis p-2 d-none">Disabled</span>
      </p>
      <button id="open" class="btn btn-outline-primary mt-2">Open Settings</button>
    </div>
  </div>

<script>
  document.getElementById('open').addEventListener('click', ()=> chrome.runtime.openOptionsPage());
  
  chrome.storage.sync.get(['enabled'], cfg => {
    const isEnabled = (typeof cfg.enabled === 'undefined') ? true : cfg.enabled;
    if (isEnabled) {
      document.getElementById('status-enabled').classList.remove('d-none');
    } else {
      document.getElementById('status-disabled').classList.remove('d-none');
    }
  });
</script>
</body></html>
